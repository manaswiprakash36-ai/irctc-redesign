<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRCTC Redesign</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="">
            <div>
                <h2>IRCTC</h2>
                <p>Indian Railways</p>
            </div>
        </div>

        <ul>
            <li class="active">Book Tickets</li>
            <li>PNR Status</li>
            <li>Train Status</li>
        </ul>

        <button class="login-btn">Login / Register</button>
    </nav>

    <!-- Hero -->
    <section class="hero">

        <h1>Book Your Journey</h1>
        <h2>Across India</h2>

        <div class="badges">
            <span>Safe</span>
            <span>Secure</span>
            <span>Fast Booking</span>
        </div>

        <!-- Search Card -->
        <div class="search-card">

            <div class="tabs">
                <button class="tab active">Book Tickets</button>
                <button class="tab">Train Number</button>
                <button class="tab">Train Name</button>
            </div>

            <div class="search-row">

                <div class="field">
                    <label>From</label>
                    <input value="Bhopal">
                </div>

                <button class="swap">⇄</button>

                <div class="field">
                    <label>To</label>
                    <input value="New Delhi">
                </div>

                <div class="field">
                    <label>Journey Date</label>
                    <input value="03 Jun 2026">
                </div>

                <div class="field">
                    <label>Class</label>
                    <input value="3A - AC Third">
                </div>

                <div class="field">
                    <label>Quota</label>
                    <input value="General">
                </div>

                <button class="search-btn">
                    Search Trains
                </button>

            </div>
        </div>

        <!-- Services -->
        <div class="services">
            <div class="card">PNR Status</div>
            <div class="card">Live Train Status</div>
            <div class="card">Cancel Ticket</div>
            <div class="card">Food on Train</div>
            <div class="card">All Services</div>
        </div>

        <!-- Train -->
        <div class="train-section">
            <img src="train.png" alt="">
        </div>

    </section>

</div>

</body>
</html>
